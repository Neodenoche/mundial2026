<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026</title>
<style>
[data-theme="dark"]{
  --bg:#0a0c10;--bg2:#12151c;--bg3:#1a1e28;--bg4:#222736;
  --t1:#ffffff;--t2:#8892a4;--t3:#50586a;
  --brd:rgba(255,255,255,0.07);--brd2:rgba(255,255,255,0.14);
  --card:#13161f;--card-brd:rgba(255,255,255,0.08);
  --match-bg:#1a1e28;--match-brd:rgba(255,255,255,0.09);
  --conn:rgba(232,160,32,0.30);
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f5f6f9;--bg4:#eaedf2;
  --t1:#0a0c10;--t2:#4a5270;--t3:#8892a4;
  --brd:rgba(0,0,0,0.08);--brd2:rgba(0,0,0,0.16);
  --card:#ffffff;--card-brd:rgba(0,0,0,0.09);
  --match-bg:#ffffff;--match-brd:rgba(0,0,0,0.10);
  --conn:rgba(232,160,32,0.50);
}
:root{--accent:#e8a020;--red:#e03535;--green:#1aad68;--blue:#2e7fe8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;min-height:100vh;}

/* в”Җв”Җ TOPBAR в”Җв”Җ */
.topbar{
  background:linear-gradient(135deg,#b87000 0%,#e8a020 60%,#f5b830 100%);
  padding:0 16px;height:46px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,0.35);
}
.tb-logo{font-size:14px;font-weight:900;color:#0a0c10;letter-spacing:2.5px;}
.tb-sep{width:1px;height:18px;background:rgba(0,0,0,0.22);}
.tb-sub{font-size:10px;color:rgba(0,0,0,0.50);font-weight:600;letter-spacing:0.3px;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.tb-btn{
  background:rgba(0,0,0,0.18);border:none;border-radius:6px;
  color:#0a0c10;font-size:10px;font-weight:800;
  padding:4px 10px;cursor:pointer;letter-spacing:0.8px;
  transition:background .15s;
}
.tb-btn:hover{background:rgba(0,0,0,0.30);}
.live-pill{
  background:#d42020;color:#fff;
  font-size:9px;font-weight:900;padding:4px 10px;border-radius:20px;
  letter-spacing:1.2px;display:flex;align-items:center;gap:4px;
}
.live-dot-anim{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.3s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* в”Җв”Җ TABS в”Җв”Җ */
.tabs{
  background:var(--bg2);
  border-bottom:1px solid var(--brd);
  display:flex;overflow-x:auto;
  position:sticky;top:46px;z-index:190;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:1;min-width:80px;padding:14px 8px 12px;
  font-size:11px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:1px;
  border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* в”Җв”Җ SECTIONS в”Җв”Җ */
.section{display:none;padding:0 0 80px;}
.section.active{display:block;}

/* в”Җв”Җ GRUPOS в”Җв”Җ */
.groups-grid{display:grid;grid-template-columns:1fr;gap:1px;background:var(--brd);}
@media(min-width:640px){.groups-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:960px){.groups-grid{grid-template-columns:repeat(3,1fr);}}
.gc{background:var(--bg2);}
.gc-head{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--brd);
}
.gc-badge{
  width:28px;height:28px;border-radius:6px;
  background:var(--accent);color:#0a0c10;
  font-size:13px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.gc-title{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;}
.st{width:100%;border-collapse:collapse;}
.st-head{padding:6px 14px;display:grid;grid-template-columns:1fr 28px 28px 28px 28px 32px;font-size:10px;color:var(--t3);font-weight:600;letter-spacing:0.5px;}
.st-head span:not(:first-child){text-align:center;}
.st-row{
  display:grid;grid-template-columns:1fr 28px 28px 28px 28px 32px;
  align-items:center;padding:8px 14px;
  border-top:1px solid var(--brd);
  transition:background .12s;
}
.st-row:hover{background:var(--bg3);}
.st-row.qual{border-left:3px solid var(--green);}
.st-row.qual2{border-left:3px solid var(--blue);}
.st-team{display:flex;align-items:center;gap:8px;min-width:0;}
.st-flag{font-size:16px;flex-shrink:0;}
.st-name{font-size:12px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.st-cell{font-size:12px;color:var(--t2);text-align:center;}
.st-pts{font-size:13px;font-weight:800;color:var(--accent);text-align:center;}
.legend-row{
  padding:8px 14px;border-top:1px solid var(--brd);
  display:flex;gap:14px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3);}
.leg-bar{width:3px;height:12px;border-radius:2px;}

/* в”Җв”Җ MATCH CARDS (resultados / prГіximos) в”Җв”Җ */
.day-sep{
  padding:12px 16px 6px;
  font-size:10px;font-weight:800;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;
}
.mcard{
  background:var(--card);border-bottom:1px solid var(--brd);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  transition:background .12s;
}
.mcard:hover{background:var(--bg3);}
.mcard.live-card{border-left:3px solid var(--red);}
.mc-meta{
  display:flex;flex-direction:column;align-items:center;
  min-width:52px;gap:3px;flex-shrink:0;
}
.mc-time{font-size:11px;font-weight:700;color:var(--accent);}
.mc-stage{font-size:9px;color:var(--t3);letter-spacing:0.5px;text-align:center;}
.mc-live-badge{
  background:var(--red);color:#fff;
  font-size:8px;font-weight:800;padding:2px 6px;border-radius:10px;
  letter-spacing:0.8px;animation:pulse 1.3s infinite;
}
.mc-body{flex:1;min-width:0;}
.mc-team{display:flex;align-items:center;gap:8px;padding:4px 0;}
.mc-team+.mc-team{border-top:1px solid var(--brd);}
.mc-flag{font-size:17px;width:24px;text-align:center;flex-shrink:0;}
.mc-name{flex:1;font-size:13px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-name.dim{color:var(--t3);font-weight:400;}
.mc-score{font-size:17px;font-weight:900;color:var(--t1);min-width:22px;text-align:right;flex-shrink:0;}
.mc-score.dim{color:var(--t3);}
.mc-score.win{color:var(--accent);}
.mc-right{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:44px;}
.mc-final{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:0.8px;}

/* prob bar */
.prob-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--brd);}
.prob-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:5px;}
.prob-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;gap:2px;}
.pb-h{background:var(--blue);}
.pb-d{background:var(--t3);}
.pb-a{background:var(--red);}

/* tv */
.tv-row{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-bottom:1px solid var(--brd);
  font-size:10px;color:var(--t3);
}
.tv-ch{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.tv-ch.espn{background:rgba(220,30,30,0.18);color:#ff6060;}
.tv-ch.dtv{background:rgba(0,180,120,0.15);color:#40d090;}
.tv-ch.tyc{background:rgba(0,120,200,0.18);color:#60b0ff;}
.tv-ch.tnt{background:rgba(120,60,220,0.18);color:#c090ff;}
.tv-ch.tel{background:rgba(180,80,0,0.18);color:#ffaa40;}
.tv-ch.win{background:rgba(200,0,80,0.18);color:#ff5090;}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BRACKET вҖ” ESTILO ESPN
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.bracket-bar{
  background:var(--bg2);
  border-bottom:1px solid var(--brd);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-wrap:wrap;position:sticky;top:96px;z-index:180;
}
.bb-title{font-size:13px;font-weight:800;color:var(--t1);letter-spacing:0.5px;}
.bb-legend{display:flex;gap:12px;flex-wrap:wrap;}
.bleg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3);}
.bleg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

.bracket-outer{overflow-x:auto;padding:20px 16px 20px;}
.bracket-outer::-webkit-scrollbar{height:4px;}
.bracket-outer::-webkit-scrollbar-track{background:var(--bg);}
.bracket-outer::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}

.bracket-flex{display:flex;align-items:flex-start;gap:0;}

/* в”Җв”Җ columna de ronda в”Җв”Җ */
.b-col{
  display:flex;flex-direction:column;
  width:180px;flex-shrink:0;
  opacity:0;transform:translateY(8px);
}
.b-col.in{animation:colIn .4s ease forwards;}
@keyframes colIn{to{opacity:1;transform:translateY(0);}}

.b-col-head{
  text-align:center;padding:0 8px 12px;
  font-size:9px;font-weight:800;
  color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;
}

.b-slots{
  display:flex;flex-direction:column;
  justify-content:space-around;
  gap:0;
}

/* в”Җв”Җ partido en bracket в”Җв”Җ */
.b-match{
  margin:4px 8px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--match-brd);
  background:var(--match-bg);
  box-shadow:0 1px 6px rgba(0,0,0,0.12);
  opacity:0;transform:translateX(-6px);
}
.b-match.min{animation:matchIn .35s ease forwards;}
@keyframes matchIn{to{opacity:1;transform:translateX(0);}}

.b-match.confirmed{border-color:rgba(255,255,255,0.13);}
.b-match.has-result{border-color:rgba(232,160,32,0.25);}

/* cada equipo dentro del partido */
.b-team{
  display:flex;align-items:center;gap:7px;
  padding:8px 10px;
  min-width:0;position:relative;
}
.b-team+.b-team{border-top:1px solid var(--brd);}
.b-team.winner{background:rgba(26,173,104,0.10);}
.b-team.loser .b-tname{opacity:0.40;}
.b-team.loser .b-tflag{opacity:0.40;}

/* TBD вҖ” parpadea dorado */
.b-team.tbd{animation:tbdGlow 2.2s ease-in-out infinite;}
@keyframes tbdGlow{
  0%,100%{background:rgba(232,160,32,0.03);}
  50%{background:rgba(232,160,32,0.10);}
}
.b-match.tbd-match{
  border-style:dashed;
  animation:borderPulse 2.2s ease-in-out infinite;
  opacity:1;transform:none;
}
@keyframes borderPulse{
  0%,100%{border-color:rgba(232,160,32,0.18);}
  50%{border-color:rgba(232,160,32,0.55);}
}

.b-tflag{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
.b-tname{flex:1;font-size:11px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-tname.tbd-txt{color:var(--t3);font-style:italic;font-size:10px;font-weight:400;}
.b-tseed{font-size:9px;color:var(--t3);flex-shrink:0;margin-left:2px;}
.b-tscore{font-size:12px;font-weight:800;color:var(--accent);margin-left:4px;flex-shrink:0;}
.b-twin-bar{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--green);border-radius:0;
}

/* в”Җв”Җ conectores SVG в”Җв”Җ */
.b-conn{flex-shrink:0;align-self:stretch;}
.b-conn svg{display:block;height:100%;}

/* nota de proyecciГіn */
.proj-note{
  margin:16px 16px 0;padding:10px 14px;
  background:rgba(232,160,32,0.07);
  border:1px solid rgba(232,160,32,0.20);
  border-radius:8px;
  font-size:11px;color:var(--t2);line-height:1.5;
}

/* в”Җв”Җ SPINNER в”Җв”Җ */
.spinner{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--t3);font-size:12px;}
.spin{width:20px;height:20px;border:2px solid var(--brd2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-logo">MUNDIAL 2026</span>
  <div class="tb-sep"></div>
  <span class="tb-sub">USA В· CAN В· MEX</span>
  <div class="tb-right">
    <button class="tb-btn" onclick="toggleLang()" id="btn-lang">EN</button>
    <button class="tb-btn" onclick="toggleTheme()" id="btn-theme">вҳҖпёҸ</button>
    <div class="live-pill"><div class="live-dot-anim"></div>LIVE</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('grupos',this)" id="tab-g">Grupos</button>
  <button class="tab" onclick="showTab('resultados',this)" id="tab-r">Resultados</button>
  <button class="tab" onclick="showTab('proximos',this)" id="tab-p">PrГіximos</button>
  <button class="tab" onclick="showTab('llaves',this)" id="tab-l">рҹҸҶ Llaves</button>
</div>

<div id="grupos"     class="section active"><div class="spinner"><div class="spin"></div><span id="sp1">Cargando...</span></div></div>

<div id="llaves"     class="section"><div class="spinner"><div class="spin"></div><span id="sp4">Cargando...</span></div></div>

};

const STR={BRA:92,FRA:91,ARG:90,GER:88,ENG:86,ESP:85,POR:84,NED:83,COL:80,NOR:79,URU:78,MAR:77,USA:76,MEX:75,JPN:74,SUI:72,KOR:71,CRO:70,BEL:69,EGY:67,SEN:66,AUS:65,ECU:64,AUT:63,DZA:62,SWE:61,SCO:60,CAN:59,PAR:57,IRN:56,GHA:55,COD:54,CZE:58,TUR:52,CIV:63,PAN:41,CUW:30,QAT:35,HTI:28,TUN:38,NZL:42,KSA:44,RSA:45,BIH:50,IRQ:40,JOR:38,UZB:36,CPV:37};

function prob(h,a){
  const hs=STR[h]||50,as=STR[a]||50,d=(hs+5)-as;
  const rh=1/(1+Math.pow(10,-d/25)),ra=1/(1+Math.pow(10,d/25));
  const dr=0.22*Math.max(0,1-Math.abs(d)/60);
  const ph=Math.max(Math.round(rh*(1-dr)*100),3),pa=Math.max(Math.round(ra*(1-dr)*100),3);
  return{ph,pd:Math.max(100-ph-pa,5),pa};
}

function fmtD(u){
  const d=new Date(u);
  const DE=['Dom','Lun','Mar','MiГ©','Jue','Vie','SГЎb'],EE=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DM=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],EM=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days=LANG==='es'?DE:EE,mons=LANG==='es'?DM:EM;
  return`${days[d.getDay()]} ${d.getDate()} ${mons[d.getMonth()]}`;
}
function fmtT(u){
  const d=new Date(u),c=new Date(d.getTime()-5*3600000);
  return`${String(c.getUTCHours()).padStart(2,'0')}:${String(c.getUTCMinutes()).padStart(2,'0')}`;
}
function gLabel(g){
  const l=(g||'').replace(/GROUP_?/,'').trim();

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BRACKET ESPN-STYLE
   Cada partido = tarjeta con 2 filas (equipos)
   Conectores SVG dorados entre columnas
   Columnas entran animadas de izq вҶ’ der
   TBD pulsa en dorado
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const MATCH_H = 74;  // altura en px de cada tarjeta de partido (2 equipos Г— ~32px + padding)
const COL_W   = 180;
const CONN_W  = 32;
const COL_DEL = 200; // ms entre columnas

function buildLlaves(standings, knockout){
  const el=document.getElementById('llaves');
  el.innerHTML='';

  /* в”Җв”Җ datos knockout reales в”Җв”Җ */
  const ko=knockout||[];
  const real={
    r16: ko.filter(m=>m.stage==='ROUND_OF_16'),
    qf:  ko.filter(m=>m.stage==='QUARTER_FINALS'),
    sf:  ko.filter(m=>m.stage==='SEMI_FINALS'),
    f:   ko.filter(m=>m.stage==='FINAL'),
  };

  /* в”Җв”Җ proyecciГіn desde grupos в”Җв”Җ */
  const leaders=[],runners=[];
  (standings||[]).forEach(g=>{
    const rows=g.table||[];
    const letter=(g.group||'?').replace(/GROUP_?/,'').trim();
    function ex(row){
      const tla=row?.team?.tla;
      // Validar que el TLA sea conocido en nuestro diccionario
      if(tla && (NES[tla]||NEN[tla])) return tla;
      // Fallback: buscar por nombre
      const name=(row?.team?.shortName||row?.team?.name||'').toLowerCase();
      for(const k of Object.keys(NES)){if(NES[k].toLowerCase().includes(name.slice(0,4))||NEN[k].toLowerCase().includes(name.slice(0,4)))return k;}
      return tla||'???';
    }
    if(rows[0]) leaders.push({tla:ex(rows[0]),group:letter,rank:1,pts:rows[0].points||0});
    if(rows[1]) runners.push({tla:ex(rows[1]),group:letter,rank:2,pts:rows[1].points||0});
  });

  /* Cruces FIFA 2026: pares de grupos adyacentes
     1В°A vs 2В°B, 1В°B vs 2В°A, 1В°C vs 2В°D, 1В°D vs 2В°C ... */
  const r16proj=[];
  for(let i=0;i<leaders.length;i+=2){
    const l1=leaders[i],l2=leaders[i+1];
    const r1=runners[i],r2=runners[i+1];
    if(l1&&r2) r16proj.push({home:l1,away:r2});
    if(l2&&r1) r16proj.push({home:l2,away:r1});
  }

  /* в”Җв”Җ normalizar rondas в”Җв”Җ */
  function norm(arr){
    return arr.map(m=>({
      home: m.home?{tla:m.home,   name:fn(m.home,  m.homeName), group:null,rank:null}:null,
      away: m.away?{tla:m.away,   name:fn(m.away,  m.awayName), group:null,rank:null}:null,
      sh:   m.status==='FINISHED'?m.sh:null,
      sa:   m.status==='FINISHED'?m.sa:null,
      done: m.status==='FINISHED',
    }));
  }
  function projNorm(arr){
    return arr.map(({home,away})=>({home,away,sh:null,sa:null,done:false}));
  }

  const useR  = real.r16.length>0;
  const rds={
    r16: useR             ? norm(real.r16) : projNorm(r16proj),
    qf:  real.qf.length>0 ? norm(real.qf)  : null,
    sf:  real.sf.length>0 ? norm(real.sf)  : null,
    f:   real.f.length>0  ? norm(real.f)   : null,
  };
  const n16=rds.r16.length||16;
  rds.qf = rds.qf || Array(Math.ceil(n16/2)).fill(null).map(()=>({home:null,away:null,sh:null,sa:null,done:false}));
  rds.sf = rds.sf || Array(Math.ceil(rds.qf.length/2)).fill(null).map(()=>({home:null,away:null,sh:null,sa:null,done:false}));
  rds.f  = rds.f  || [{home:null,away:null,sh:null,sa:null,done:false}];

  /* в”Җв”Җ DOM: tarjeta de partido в”Җв”Җ */
  function makeMatch(m, delay){
    const isTBD = !m.home && !m.away;
    const wrap=document.createElement('div');
    wrap.className=`b-match${isTBD?' tbd-match':m.done?' has-result':m.home||m.away?' confirmed':''}`;

    if(!isTBD){
      wrap.style.animationDelay=delay+'ms';
      wrap.classList.add('min');
    }

    function makeTeam(team, win, score){
      const div=document.createElement('div');
      if(!team){
        div.className='b-team tbd';
        div.innerHTML=`<span class="b-tflag" style="opacity:.2">?</span><span class="b-tname tbd-txt">${t('tbd')}</span>`;
      } else {
        const loser=m.done&&!win&&m.sh!==m.sa;
        div.className=`b-team${win?' winner':loser?' loser':''}`;
        if(win){const bar=document.createElement('div');bar.className='b-twin-bar';div.appendChild(bar);}
        const seed=team.group?`<span class="b-tseed">${team.rank}В°${team.group}</span>`:'';
        const sc=score!=null?`<span class="b-tscore">${score}</span>`:'';
        div.innerHTML=`<span class="b-tflag">${ff(team.tla)}</span><span class="b-tname">${fn(team.tla,team.name)}</span>${seed}${sc}`;
      }
      return div;
    }

    const hwin=m.sh!=null&&m.sh>m.sa,awin=m.sa!=null&&m.sa>m.sh;
    wrap.appendChild(makeTeam(m.home,hwin,m.sh));
    wrap.appendChild(makeTeam(m.away,awin,m.sa));
    return wrap;
  }

  /* в”Җв”Җ DOM: columna в”Җв”Җ */
  function makeCol(label, matches, colIdx){
    const col=document.createElement('div');col.className='b-col';
    const head=document.createElement('div');head.className='b-col-head';head.textContent=label;
    col.appendChild(head);
    const slots=document.createElement('div');slots.className='b-slots';
    // altura total de la columna = n16 * MATCH_H para mantener alineaciГіn
    slots.style.minHeight=(n16*MATCH_H)+'px';
    matches.forEach((m,i)=>{
      slots.appendChild(makeMatch(m, colIdx*COL_DEL + i*80));
    });
    col.appendChild(slots);
    setTimeout(()=>col.classList.add('in'), colIdx*COL_DEL);
    return col;
  }

  /* в”Җв”Җ DOM: conectores SVG в”Җв”Җ */
  function makeConn(nLeft, nRight){
    const totalH=n16*MATCH_H;
    const wrap=document.createElement('div');wrap.className='b-conn';wrap.style.width=CONN_W+'px';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox',`0 0 ${CONN_W} ${totalH}`);
    svg.setAttribute('width',String(CONN_W));
    svg.setAttribute('height',String(totalH));
    svg.style.display='block';
    const unitL=totalH/nLeft, unitR=totalH/nRight;
    const color='rgba(232,160,32,0.28)';
    for(let i=0;i<nRight;i++){
      const l1=i*2,l2=i*2+1;
      if(l1>=nLeft) break;
      const y1=unitL*(l1+0.5), y2=l2<nLeft?unitL*(l2+0.5):y1;
      const yr=unitR*(i+0.5), ym=(y1+y2)/2;
      function line(d){
        const p=document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d',d);p.setAttribute('stroke',color);
        p.setAttribute('stroke-width','1.5');p.setAttribute('fill','none');
        p.setAttribute('stroke-linecap','round');svg.appendChild(p);
      }
      line(`M0,${y1} H${CONN_W/2}`);
      if(l2<nLeft) line(`M0,${y2} H${CONN_W/2}`);
      line(`M${CONN_W/2},${y1} V${l2<nLeft?y2:y1}`);
      line(`M${CONN_W/2},${ym} H${CONN_W}`);
    }
    wrap.appendChild(svg);
    return wrap;
  }

  /* в”Җв”Җ ensamblar в”Җв”Җ */
  // barra superior
  const bar=document.createElement('div');bar.className='bracket-bar';
  bar.innerHTML=`<span class="bb-title">${t('bracket')}</span>
    <div class="bb-legend">
      <div class="bleg"><div class="bleg-dot" style="background:rgba(26,173,104,0.12);border:1px solid rgba(26,173,104,0.45)"></div>${t('legW')}</div>
      <div class="bleg"><div class="bleg-dot" style="background:rgba(232,160,32,0.08);border:1.5px dashed rgba(232,160,32,0.45)"></div>${t('legT')}</div>
    </div>`;
  el.appendChild(bar);

  const outer=document.createElement('div');outer.className='bracket-outer';
  const flex=document.createElement('div');flex.className='bracket-flex';

  const nQF=rds.qf.length, nSF=rds.sf.length;

  flex.appendChild(makeCol(t('r16'), rds.r16, 0));
  flex.appendChild(makeConn(n16, nQF));
  flex.appendChild(makeCol(t('qf'),  rds.qf,  1));
  flex.appendChild(makeConn(nQF, nSF));
  flex.appendChild(makeCol(t('sf'),  rds.sf,  2));
  flex.appendChild(makeConn(nSF, 1));
  flex.appendChild(makeCol(t('final'),rds.f,  3));

  outer.appendChild(flex);
  el.appendChild(outer);

  if(!useR){
    const note=document.createElement('div');note.className='proj-note';note.textContent=t('proj');
    el.appendChild(note);
  }
}

/* в•җв•җв•җв•җв•җв•җ TABS в•җв•җв•җв•җв•җв•җ */
function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='llaves'){
    // re-triggerear animaciones
    document.querySelectorAll('.b-col').forEach((c,i)=>{
      c.classList.remove('in');void c.offsetWidth;
      setTimeout(()=>c.classList.add('in'),i*COL_DEL);
    });
  }
}

/* в•җв•җв•җв•җв•җв•җ LANG / THEME в•җв•җв•җв•җв•җв•җ */
function toggleLang(){
  LANG=LANG==='es'?'en':'es';
  document.getElementById('btn-lang').textContent=LANG==='es'?'EN':'ES';
  document.getElementById('tab-g').textContent=t('grupos');
  document.getElementById('tab-r').textContent=t('res');
  document.getElementById('tab-p').textContent=t('prox');
  document.getElementById('tab-l').textContent=t('llaves');
  if(lastData) rebuild(lastData);
}
function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('btn-theme').textContent=dark?'рҹҢҷ':'вҳҖпёҸ';
}

/* в•җв•җв•җв•җв•җв•җ FETCH в•җв•җв•җв•җв•җв•җ */
let lastData=null;
function rebuild(d){
  buildGrupos(d.standings);
  buildResultados(d.finished);
  buildProximos(d.upcoming,d.live);
  buildLlaves(d.standings,d.knockout);
}

async function fetchData(){
  try{
    const res=await fetch('/.netlify/functions/scores');
    if(!res.ok) throw new Error();
    lastData=await res.json();
    rebuild(lastData);
    const now=new Date();
    // update badge en meta si existe
  }catch(e){
    if(!lastData) ['grupos','resultados','proximos','llaves'].forEach(id=>{
      document.getElementById(id).innerHTML=`<div class="spinner"><div class="spin"></div>${t('nodata')}</div>`;
    });
    console.error(e);
  }
}

fetchData();
setInterval(fetchData,60000);
</script>
