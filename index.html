<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 вАФ Fixture</title>
<style>
:root {
  --bg:#0d0f14; --bg2:#151820; --bg3:#1c2030; --bg4:#232840;
  --accent:#e8a020; --red:#e03030; --green:#18a060; --blue:#3080e0;
  --t1:#f0f2f8; --t2:#909ab0; --t3:#50586a;
  --brd:rgba(255,255,255,0.08); --brd2:rgba(255,255,255,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

.topbar{background:linear-gradient(90deg,#c87800,#e8a020);padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:13px;font-weight:800;color:#0d0f14;letter-spacing:2px;}
.topbar-sep{width:1px;height:16px;background:rgba(0,0,0,0.25);flex-shrink:0;}
.topbar-sub{font-size:10px;color:rgba(0,0,0,0.55);font-weight:500;}
.by-tag{font-size:10px;font-weight:800;color:rgba(0,0,0,0.55);letter-spacing:1.5px;margin-left:auto;margin-right:8px;}
.live-dot{background:#cc2020;color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:1px;animation:blink 1.4s ease-in-out infinite;flex-shrink:0;}

.hero{padding:14px 14px 10px;border-bottom:1px solid var(--brd);}
.hero-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;line-height:1.1;}
.hero-title span{color:var(--accent);}
.hero-meta{font-size:11px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.update-badge{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.update-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;}

.tabs{display:flex;border-bottom:1px solid var(--brd);background:var(--bg);position:sticky;top:41px;z-index:99;overflow-x:auto;}
.tab{flex:1;min-width:72px;font-size:11px;font-weight:700;color:var(--t2);padding:12px 4px;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;letter-spacing:0.8px;text-transform:uppercase;transition:color .15s,border-color .15s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.section{display:none;padding:12px 12px 80px;}
.section.active{display:block;}

/* GRUPOS */
.groups-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:600px){.groups-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:900px){.groups-grid{grid-template-columns:repeat(3,1fr);}}
.gc{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.gc-head{padding:8px 12px;display:flex;align-items:center;gap:8px;background:var(--bg3);border-bottom:1px solid var(--brd);}
.gc-letter{width:22px;height:22px;border-radius:5px;background:var(--accent);color:#0d0f14;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.gc-label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1px;}
.st{width:100%;border-collapse:collapse;font-size:12px;}
.st th{padding:5px 8px;text-align:right;color:var(--t3);font-size:10px;font-weight:500;letter-spacing:0.5px;}
.st th:first-child{text-align:left;}
.st td{padding:7px 8px;text-align:right;color:var(--t2);border-top:1px solid var(--brd);}
.st td:first-child{text-align:left;color:var(--t1);}
.st tr.q td{background:rgba(24,160,96,0.08);}
.st tr.q td:first-child{border-left:2px solid var(--green);}
.tn{display:flex;align-items:center;gap:7px;}
.fl{font-size:15px;line-height:1;flex-shrink:0;}
.pts{color:var(--accent)!important;font-weight:700;}
.legend{font-size:10px;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:6px;}
.legend-dot{width:8px;height:8px;background:var(--green);border-radius:2px;flex-shrink:0;}

/* PARTIDOS */
.day-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:14px 0 7px;}
.day-label:first-child{padding-top:2px;}
.mcard{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.mcard.live-match{border-color:var(--red);box-shadow:0 0 0 1px rgba(224,48,48,0.2);}
.mtag{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.live-badge{background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:1px;animation:blink 1.4s ease-in-out infinite;flex-shrink:0;}
.mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.mteam{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--t1);min-width:0;}
.mteam.away{flex-direction:row-reverse;text-align:right;}
.mteam span.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mteam.dim{color:var(--t3);}
.mteam.dim span.name{font-weight:400;}
.mscore{display:flex;align-items:center;gap:6px;justify-content:center;min-width:56px;}
.mscore-n{font-size:22px;font-weight:800;color:var(--t1);line-height:1;}
.mscore-n.dim{color:var(--t3);}
.mscore-sep{font-size:14px;color:var(--t3);}
.mstatus{text-align:center;font-size:10px;color:var(--t3);margin-top:6px;letter-spacing:0.5px;}
.mstatus.live-min{color:var(--red);font-weight:700;}
.time-badge{background:var(--bg4);color:var(--accent);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.vs-badge{font-size:10px;color:var(--t3);font-weight:800;letter-spacing:1px;}
.stage-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.5px;}
.stage-r16{background:rgba(48,128,224,0.15);color:#60a8ff;}
.stage-qf{background:rgba(232,160,32,0.15);color:var(--accent);}
.stage-sf{background:rgba(24,160,96,0.15);color:#40d090;}
.stage-f{background:rgba(224,48,48,0.15);color:#ff6060;}
.prob-wrap{margin-top:9px;}
.prob-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:2px;}
.prob-h{background:var(--blue);border-radius:2px;}
.prob-d{background:var(--bg4);border-radius:2px;}
.prob-a{background:var(--red);border-radius:2px;}
.prob-lbs{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:4px;}
.prob-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:2px;}
.tv-wrap{margin-top:9px;padding-top:8px;border-top:1px solid var(--brd);}
.tv-label{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:5px;}
.tv-channels{display:flex;flex-wrap:wrap;gap:4px;}
.tv-ch{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;}
.tv-ch.tyc{background:rgba(0,120,200,0.2);color:#4da6ff;}
.tv-ch.espn{background:rgba(220,30,30,0.2);color:#ff6060;}
.tv-ch.dtv{background:rgba(0,180,120,0.15);color:#40d090;}
.tv-ch.tel{background:rgba(180,80,0,0.2);color:#ffaa40;}
.tv-ch.tnt{background:rgba(100,60,200,0.2);color:#b090ff;}
.tv-ch.win{background:rgba(200,0,80,0.2);color:#ff4090;}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   BRACKET / LLAVES
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
.bracket-scroll{overflow-x:auto;padding-bottom:16px;}
.bracket-wrap{display:flex;align-items:stretch;min-width:720px;gap:0;}

.b-round{display:flex;flex-direction:column;width:160px;flex-shrink:0;}
.b-round-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;text-align:center;padding-bottom:10px;color:var(--accent);}
.b-round-matches{display:flex;flex-direction:column;flex:1;justify-content:space-around;}
.b-connectors{width:28px;flex-shrink:0;display:flex;flex-direction:column;position:relative;}
.b-connectors svg{width:100%;flex:1;}

/* partido en el bracket */
.b-match{margin:3px 6px;}

/* вФАвФА animaci√≥n de entrada por columna вФАвФА */
.b-round{opacity:0;transform:translateX(-12px);}
.b-round.anim-in{animation:slideIn 0.4s ease forwards;}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}

/* cada equipo dentro del bracket */
.b-team{
  display:flex;align-items:center;gap:5px;
  padding:7px 8px;
  background:var(--bg2);border:1px solid var(--brd);
  font-size:11px;
  opacity:0;transform:translateY(6px);
}
.b-team:first-child{border-radius:6px 6px 0 0;border-bottom-color:transparent;}
.b-team:last-child{border-radius:0 0 6px 6px;}

/* estado definido вЖТ entra animado */
.b-team.team-in{animation:teamIn 0.35s ease forwards;}
@keyframes teamIn{to{opacity:1;transform:translateY(0);}}

/* ganador */
.b-team.winner{background:rgba(24,160,96,0.13);border-color:rgba(24,160,96,0.38);}
/* con resultado */
.b-team.has-result{background:rgba(232,160,32,0.06);border-color:rgba(232,160,32,0.2);}

/* indefinido вЖТ parpadea en dorado */
.b-team.tbd{
  animation:tbdPulse 1.8s ease-in-out infinite;
  opacity:1;transform:translateY(0);
  border-style:dashed;border-color:rgba(232,160,32,0.25);
}
@keyframes tbdPulse{
  0%,100%{background:rgba(232,160,32,0.03);border-color:rgba(232,160,32,0.18);}
  50%{background:rgba(232,160,32,0.10);border-color:rgba(232,160,32,0.42);}
}

.b-flag{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.b-name{flex:1;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-name.tbd-name{color:var(--t3);font-style:italic;}
.b-seed{font-size:9px;color:var(--t3);flex-shrink:0;white-space:nowrap;}
.b-score{font-size:11px;font-weight:700;color:var(--accent);margin-left:2px;flex-shrink:0;}
.b-mid{height:1px;background:var(--brd);margin:0 6px;}

.bracket-note{font-size:10px;color:var(--t3);text-align:center;margin-top:14px;line-height:1.6;padding:0 8px;}
.bracket-legend{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.bl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3);}
.bl-box{width:12px;height:12px;border-radius:2px;flex-shrink:0;}

/* spinner */
.spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--t3);font-size:13px;}
.spin{width:24px;height:24px;border:2px solid var(--brd2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">MUNDIAL 2026</span>
  <div class="topbar-sep"></div>
  <span class="topbar-sub">USA ¬Ј CAN ¬Ј MEX</span>
  <span class="by-tag">вЪ° EMI ¬Ј NEODENOCHE</span>
  <span class="live-dot">вЧП LIVE</span>
</div>

<div class="hero">
  <div class="hero-title">FASE DE <span>GRUPOS</span></div>
  <div class="hero-meta">
    <span>48 selecciones ¬Ј 12 grupos</span>
    <span class="update-badge"><span class="update-dot"></span><span id="last-update">Cargando...</span></span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="show('grupos',this)">Grupos</button>
  <button class="tab" onclick="show('resultados',this)">Resultados</button>
  <button class="tab" onclick="show('proximos',this)">Pr√≥ximos</button>
  <button class="tab" onclick="show('llaves',this)">рЯПЖ Llaves</button>
</div>

<div id="grupos"     class="section active"><div class="spinner"><div class="spin"></div>Cargando grupos...</div></div>
<div id="resultados" class="section"><div class="spinner"><div class="spin"></div>Cargando resultados...</div></div>
<div id="proximos"   class="section"><div class="spinner"><div class="spin"></div>Cargando partidos...</div></div>
<div id="llaves"     class="section"><div class="spinner"><div class="spin"></div>Cargando llaves...</div></div>

<script>
const FL={MEX:'рЯЗ≤рЯЗљ',KOR:'рЯЗ∞рЯЗЈ',CZE:'рЯЗ®рЯЗњ',RSA:'рЯЗњрЯЗ¶',CAN:'рЯЗ®рЯЗ¶',SUI:'рЯЗ®рЯЗ≠',BIH:'рЯЗІрЯЗ¶',QAT:'рЯЗґрЯЗ¶',BRA:'рЯЗІрЯЗЈ',MAR:'рЯЗ≤рЯЗ¶',SCO:'рЯПіу†БІу†БҐу†Б≥у†Б£у†Біу†Бњ',HTI:'рЯЗ≠рЯЗє',USA:'рЯЗЇрЯЗЄ',AUS:'рЯЗ¶рЯЗЇ',PAR:'рЯЗµрЯЗЊ',TUR:'рЯЗєрЯЗЈ',GER:'рЯЗ©рЯЗ™',CIV:'рЯЗ®рЯЗЃ',ECU:'рЯЗ™рЯЗ®',CUW:'рЯЗ®рЯЗЉ',NED:'рЯЗ≥рЯЗ±',SWE:'рЯЗЄрЯЗ™',JPN:'рЯЗѓрЯЗµ',TUN:'рЯЗєрЯЗ≥',NZL:'рЯЗ≥рЯЗњ',IRN:'рЯЗЃрЯЗЈ',BEL:'рЯЗІрЯЗ™',EGY:'рЯЗ™рЯЗђ',URU:'рЯЗЇрЯЗЊ',KSA:'рЯЗЄрЯЗ¶',ESP:'рЯЗ™рЯЗЄ',CPV:'рЯЗ®рЯЗї',FRA:'рЯЗЂрЯЗЈ',NOR:'рЯЗ≥рЯЗі',SEN:'рЯЗЄрЯЗ≥',IRQ:'рЯЗЃрЯЗґ',ARG:'рЯЗ¶рЯЗЈ',AUT:'рЯЗ¶рЯЗє',JOR:'рЯЗѓрЯЗі',DZA:'рЯЗ©рЯЗњ',COL:'рЯЗ®рЯЗі',COD:'рЯЗ®рЯЗ©',POR:'рЯЗµрЯЗє',UZB:'рЯЗЇрЯЗњ',ENG:'рЯПіу†БІу†БҐу†Б•у†БЃу†БІу†Бњ',GHA:'рЯЗђрЯЗ≠',PAN:'рЯЗµрЯЗ¶',CRO:'рЯЗ≠рЯЗЈ'};
const TV_DATA={MEX:['ESPN','DirecTV','Televisa'],KOR:['ESPN','DirecTV'],CZE:['ESPN','DirecTV'],RSA:['ESPN','DirecTV'],CAN:['ESPN','DirecTV'],SUI:['ESPN','DirecTV'],BIH:['ESPN','DirecTV'],QAT:['ESPN','DirecTV'],BRA:['ESPN','DirecTV','TV P√Їblica'],MAR:['ESPN','DirecTV'],SCO:['ESPN','DirecTV'],HTI:['ESPN','DirecTV'],USA:['ESPN','DirecTV','Telemundo'],AUS:['ESPN','DirecTV'],PAR:['TyC Sports','ESPN','DirecTV'],TUR:['ESPN','DirecTV'],GER:['ESPN','DirecTV','TNT Sports'],CIV:['ESPN','DirecTV'],ECU:['ESPN','DirecTV'],CUW:['ESPN','DirecTV'],NED:['ESPN','DirecTV'],SWE:['ESPN','DirecTV'],JPN:['ESPN','DirecTV'],TUN:['ESPN','DirecTV'],NZL:['ESPN','DirecTV'],IRN:['ESPN','DirecTV'],BEL:['ESPN','DirecTV'],EGY:['ESPN','DirecTV'],URU:['TyC Sports','ESPN','DirecTV'],KSA:['ESPN','DirecTV'],ESP:['ESPN','DirecTV','TNT Sports'],CPV:['ESPN','DirecTV'],FRA:['ESPN','DirecTV','TNT Sports'],NOR:['ESPN','DirecTV'],SEN:['ESPN','DirecTV'],IRQ:['ESPN','DirecTV'],ARG:['TyC Sports','ESPN','DirecTV'],AUT:['ESPN','DirecTV'],JOR:['ESPN','DirecTV'],DZA:['ESPN','DirecTV'],COL:['ESPN','DirecTV','Win Sports'],COD:['ESPN','DirecTV'],POR:['ESPN','DirecTV'],UZB:['ESPN','DirecTV'],ENG:['ESPN','DirecTV','TNT Sports'],GHA:['ESPN','DirecTV'],PAN:['ESPN','DirecTV'],CRO:['ESPN','DirecTV']};
const TV_CLASS={'TyC Sports':'tyc','ESPN':'espn','DirecTV':'dtv','Telemundo':'tel','TNT Sports':'tnt','Televisa':'dtv','TV P√Їblica':'dtv','Win Sports':'win'};
const STRENGTH={BRA:92,FRA:91,ARG:90,GER:88,ENG:86,ESP:85,POR:84,NED:83,COL:80,NOR:79,URU:78,MAR:77,USA:76,MEX:75,JPN:74,SUI:72,KOR:71,CRO:70,BEL:69,EGY:67,SEN:66,AUS:65,ECU:64,AUT:63,DZA:62,SWE:61,SCO:60,CAN:59,PAR:57,IRN:56,GHA:55,COD:54,CZE:58,TUR:52,CIV:63,PAN:41,CUW:30,QAT:35,HTI:28,TUN:38,NZL:42,KSA:44,RSA:45,BIH:50,IRQ:40,JOR:38,UZB:36,CPV:37};

function flag(t){return FL[t]||'рЯП≥';}
function calcProbs(h,a){
  const hs=STRENGTH[h]||50,as=STRENGTH[a]||50,diff=(hs+5)-as;
  const rawH=1/(1+Math.pow(10,-diff/25)),rawA=1/(1+Math.pow(10,diff/25));
  const draw=0.22*Math.max(0,1-Math.abs(diff)/60);
  const ph=Math.max(Math.round(rawH*(1-draw)*100),3),pa=Math.max(Math.round(rawA*(1-draw)*100),3);
  return{ph,pd:Math.max(100-ph-pa,5),pa};
}
function tvHTML(tla){
  const chs=TV_DATA[tla]||['ESPN','DirecTV'];
  return`<div class="tv-wrap"><div class="tv-label">рЯУЇ D√≥nde ver</div><div class="tv-channels">${chs.map(c=>`<span class="tv-ch ${TV_CLASS[c]||'espn'}">${c}</span>`).join('')}</div></div>`;
}
function fmtDate(utc){
  const d=new Date(utc);
  return`${['Dom','Lun','Mar','Mi√©','Jue','Vie','S√°b'][d.getDay()]} ${d.getDate()} ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]}`;
}
function fmtTime(utc){
  const d=new Date(utc),col=new Date(d.getTime()-5*3600000);
  return`${String(col.getUTCHours()).padStart(2,'0')}:${String(col.getUTCMinutes()).padStart(2,'0')}`;
}
function groupLabel(g){return g?g.replace(/GROUP_?/,'Grupo '):''}
function stageLabel(s){return{ROUND_OF_16:'Octavos',QUARTER_FINALS:'Cuartos',SEMI_FINALS:'Semis',FINAL:'Final'}[s]||s;}
function stageClass(s){return'stage-'+({ROUND_OF_16:'r16',QUARTER_FINALS:'qf',SEMI_FINALS:'sf',FINAL:'f'}[s]||'r16');}

/* вФАвФА GRUPOS вФАвФА */
function buildGrupos(standings){
  const el=document.getElementById('grupos');
  if(!standings||!standings.length){el.innerHTML='<div class="spinner">Sin datos a√Їn.</div>';return;}
  el.innerHTML='';
  const grid=document.createElement('div');grid.className='groups-grid';
  standings.forEach(group=>{
    const letter=(group.group||'?').replace(/GROUP_?/,'').trim();
    const rows=group.table||[];
    const c=document.createElement('div');c.className='gc';
    c.innerHTML=`<div class="gc-head"><div class="gc-letter">${letter}</div><span class="gc-label">Grupo ${letter}</span></div>
    <table class="st"><thead><tr><th>Selecci√≥n</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>Pts</th></tr></thead>
    <tbody>${rows.map((r,i)=>{
      const tla=r.team?.tla||'???',name=r.team?.shortName||r.team?.name||tla;
      return`<tr class="${i<2?'q':''}"><td><div class="tn"><span class="fl">${flag(tla)}</span><span>${name}</span></div></td>
      <td>${r.playedGames||0}</td><td>${r.won||0}</td><td>${r.draw||0}</td><td>${r.lost||0}</td><td class="pts">${r.points||0}</td></tr>`;
    }).join('')}</tbody></table>`;
    grid.appendChild(c);
  });
  el.appendChild(grid);
  const leg=document.createElement('div');leg.className='legend';
  leg.innerHTML='<div class="legend-dot"></div>Los 2 primeros de cada grupo clasifican a octavos';
  el.appendChild(leg);
}

/* вФАвФА RESULTADOS вФАвФА */
function buildResultados(finished){
  const el=document.getElementById('resultados');
  el.innerHTML='';
  if(!finished||!finished.length){el.innerHTML='<div class="spinner">Sin resultados a√Їn.</div>';return;}
  const byDay={};
  finished.forEach(m=>{const d=fmtDate(m.date);if(!byDay[d])byDay[d]=[];byDay[d].push(m);});
  Object.entries(byDay).forEach(([date,ms])=>{
    const dl=document.createElement('div');dl.className='day-label';dl.textContent=date;el.appendChild(dl);
    ms.forEach(m=>{
      const hw=m.sh>m.sa,aw=m.sa>m.sh;
      const si=m.stage&&m.stage!=='GROUP_STAGE'?`<span class="stage-badge ${stageClass(m.stage)}">${stageLabel(m.stage)}</span>`:`<span>${groupLabel(m.group)}</span>`;
      const card=document.createElement('div');card.className='mcard';
      card.innerHTML=`<div class="mtag">${si}</div>
      <div class="mrow">
        <div class="mteam ${hw?'':'dim'}"><span class="fl">${flag(m.home)}</span><span class="name">${m.homeName||m.home}</span></div>
        <div class="mscore"><span class="mscore-n ${hw?'':'dim'}">${m.sh}</span><span class="mscore-sep">вАУ</span><span class="mscore-n ${aw?'':'dim'}">${m.sa}</span></div>
        <div class="mteam away ${aw?'':'dim'}"><span class="name">${m.awayName||m.away}</span><span class="fl">${flag(m.away)}</span></div>
      </div><div class="mstatus">FINAL</div>`;
      el.appendChild(card);
    });
  });
}

/* вФАвФА PR√УXIMOS вФАвФА */
function buildProximos(upcoming,live){
  const el=document.getElementById('proximos');
  el.innerHTML='';
  if(live&&live.length){
    const dl=document.createElement('div');dl.className='day-label';dl.innerHTML='рЯФі EN JUEGO AHORA';el.appendChild(dl);
    live.forEach(m=>{
      const card=document.createElement('div');card.className='mcard live-match';
      card.innerHTML=`<div class="mtag"><span>EN VIVO</span><span class="live-badge">вЧП ${m.min||'LIVE'}'</span></div>
      <div class="mrow">
        <div class="mteam"><span class="fl">${flag(m.home)}</span><span class="name">${m.homeName||m.home}</span></div>
        <div class="mscore"><span class="mscore-n">${m.sh}</span><span class="mscore-sep">вАУ</span><span class="mscore-n">${m.sa}</span></div>
        <div class="mteam away"><span class="name">${m.awayName||m.away}</span><span class="fl">${flag(m.away)}</span></div>
      </div><div class="mstatus live-min">вП± Minuto ${m.min||'вАУ'}</div>${tvHTML(m.home)}`;
      el.appendChild(card);
    });
  }
  if(!upcoming||!upcoming.length){if(!live||!live.length)el.innerHTML='<div class="spinner">No hay pr√≥ximos partidos.</div>';return;}
  const byDay={};
  upcoming.forEach(m=>{const d=fmtDate(m.date);if(!byDay[d])byDay[d]=[];byDay[d].push(m);});
  Object.entries(byDay).forEach(([date,ms])=>{
    const dl=document.createElement('div');dl.className='day-label';dl.textContent=date;el.appendChild(dl);
    ms.forEach(m=>{
      const t=fmtTime(m.date),p=calcProbs(m.home,m.away);
      const si=m.stage&&m.stage!=='GROUP_STAGE'?`<span class="stage-badge ${stageClass(m.stage)}">${stageLabel(m.stage)}</span>`:`<span>${groupLabel(m.group)}</span>`;
      const card=document.createElement('div');card.className='mcard';
      card.innerHTML=`<div class="mtag">${si}<span class="time-badge">${t} ¬Ј Col/Pe</span></div>
      <div class="mrow">
        <div class="mteam"><span class="fl">${flag(m.home)}</span><span class="name">${m.homeName||m.home}</span></div>
        <div class="mscore"><span class="vs-badge">VS</span></div>
        <div class="mteam away"><span class="name">${m.awayName||m.away}</span><span class="fl">${flag(m.away)}</span></div>
      </div>
      <div class="prob-wrap">
        <div class="prob-bar"><div class="prob-h" style="width:${p.ph}%"></div><div class="prob-d" style="width:${p.pd}%"></div><div class="prob-a" style="width:${p.pa}%"></div></div>
        <div class="prob-lbs">
          <span><span class="prob-dot" style="background:var(--blue)"></span>${flag(m.home)} ${p.ph}%</span>
          <span>Empate ${p.pd}%</span>
          <span>${p.pa}% ${flag(m.away)}<span class="prob-dot" style="background:var(--red)"></span></span>
        </div>
      </div>${tvHTML(m.home)}`;
      el.appendChild(card);
    });
  });
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   LLAVES вАФ bracket animado
   L√≥gica de animaci√≥n:
   1. Columnas entran de izq a derecha con delay escalonado
   2. Equipos definidos aparecen con fadeUp dentro de su columna
   3. Slots indefinidos parpadean en dorado (CSS tbdPulse)
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function buildLlaves(standings, knockout){
  const el=document.getElementById('llaves');
  el.innerHTML='';

  const ko=knockout||[];
  const r16real=ko.filter(m=>m.stage==='ROUND_OF_16');
  const qfreal =ko.filter(m=>m.stage==='QUARTER_FINALS');
  const sfreal =ko.filter(m=>m.stage==='SEMI_FINALS');
  const freal  =ko.filter(m=>m.stage==='FINAL');

  // Proyecci√≥n desde grupos
  const leaders=[],runners=[];
  (standings||[]).forEach(g=>{
    const t=g.table||[];
    const letter=(g.group||'?').replace(/GROUP_?/,'').trim();
    if(t[0]) leaders.push({tla:t[0].team?.tla||'???',name:t[0].team?.shortName||t[0].team?.name||'???',group:letter,rank:1,defined:true});
    if(t[1]) runners.push({tla:t[1].team?.tla||'???',name:t[1].team?.shortName||t[1].team?.name||'???',group:letter,rank:2,defined:true});
  });

  // Cruce cl√°sico: 1¬∞A vs 2¬∞B, 1¬∞B vs 2¬∞A ...
  const r16proj=[];
  for(let i=0;i<leaders.length;i+=2){
    if(leaders[i]&&runners[i+1]) r16proj.push([leaders[i],runners[i+1]]);
    if(leaders[i+1]&&runners[i]) r16proj.push([leaders[i+1],runners[i]]);
  }

  const useReal16=r16real.length>0;
  const useRealQF=qfreal.length>0;
  const useRealSF=sfreal.length>0;
  const useRealF =freal.length>0;

  function apiTeam(tla,name){return tla?{tla,name:name||tla,defined:true}:null;}
  function realRound(arr){
    return arr.map(m=>({
      home:apiTeam(m.home,m.homeName),
      away:apiTeam(m.away,m.awayName),
      sh:m.status==='FINISHED'?m.sh:null,
      sa:m.status==='FINISHED'?m.sa:null,
      finished:m.status==='FINISHED'
    }));
  }

  const round16 = useReal16 ? realRound(r16real) : r16proj.map(([h,a])=>({home:h,away:a,sh:null,sa:null,finished:false}));
  const n16=round16.length;
  const nQF=useRealQF?qfreal.length:Math.ceil(n16/2);
  const nSF=useRealSF?sfreal.length:Math.ceil(nQF/2);

  const roundQF=useRealQF?realRound(qfreal):Array(nQF).fill(null).map(()=>({home:null,away:null,sh:null,sa:null,finished:false}));
  const roundSF=useRealSF?realRound(sfreal):Array(nSF).fill(null).map(()=>({home:null,away:null,sh:null,sa:null,finished:false}));
  const roundF =useRealF ?realRound(freal) :[{home:null,away:null,sh:null,sa:null,finished:false}];

  /* renderiza un equipo individual */
  function teamEl(t, win, score, teamDelay){
    const el=document.createElement('div');
    if(!t){
      // indefinido вЖТ parpadea
      el.className='b-team tbd';
      el.innerHTML=`<span class="b-flag" style="opacity:0.3">?</span><span class="b-name tbd-name">Por definir</span>`;
    } else {
      const hasScore=score!=null;
      el.className=`b-team ${win?'winner':''} ${hasScore?'has-result':''}`;
      el.style.animationDelay=teamDelay+'ms';
      el.classList.add('team-in');
      const sc=hasScore?`<span class="b-score">${score}</span>`:'';
      el.innerHTML=`<span class="b-flag">${flag(t.tla)}</span>
        <span class="b-name">${t.name}</span>
        ${t.group?`<span class="b-seed">${t.rank||''}¬∞${t.group}</span>`:''}
        ${sc}`;
    }
    return el;
  }

  /* renderiza un partido completo (2 equipos + divisor) */
  function matchEl(m, baseDelay){
    const wrap=document.createElement('div');wrap.className='b-match';
    const hwin=m.sh!=null&&m.sh>m.sa, awin=m.sa!=null&&m.sa>m.sh;
    const home=teamEl(m.home,hwin,m.sh,baseDelay);
    const mid=document.createElement('div');mid.className='b-mid';
    const away=teamEl(m.away,awin,m.sa,baseDelay+80);
    wrap.appendChild(home);wrap.appendChild(mid);wrap.appendChild(away);
    return wrap;
  }

  /* renderiza una columna completa de ronda */
  function roundEl(matches, label, colDelay){
    const col=document.createElement('div');col.className='b-round';
    col.style.animationDelay=colDelay+'ms';

    const lbl=document.createElement('div');lbl.className='b-round-label';lbl.textContent=label;
    col.appendChild(lbl);

    const matchesWrap=document.createElement('div');matchesWrap.className='b-round-matches';
    matches.forEach((m,i)=>{
      // delay del equipo = delay columna + i*120ms para que entren escalonados
      matchesWrap.appendChild(matchEl(m, colDelay+i*120));
    });
    col.appendChild(matchesWrap);

    // Trigger animaci√≥n de columna
    requestAnimationFrame(()=>requestAnimationFrame(()=>col.classList.add('anim-in')));
    return col;
  }

  /* conectores SVG */
  function connectorsEl(nLeft, nRight, matchH){
    const wrap=document.createElement('div');wrap.className='b-connectors';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox',`0 0 28 ${matchH*nLeft}`);
    svg.setAttribute('preserveAspectRatio','none');
    const color='rgba(255,255,255,0.10)';
    const xM=14;
    for(let i=0;i<nRight;i++){
      const l1=i*2, l2=i*2+1;
      if(l1>=nLeft) break;
      const cy1=(l1+0.5)*matchH;
      const cy2=l2<nLeft?(l2+0.5)*matchH:cy1;
      const cyr=(matchH*nLeft/nRight)*(i+0.5);
      const cmid=(cy1+cy2)/2;
      const mk=(d)=>{const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('stroke',color);p.setAttribute('stroke-width','1.5');p.setAttribute('fill','none');svg.appendChild(p);};
      mk(`M0 ${cy1} H${xM}`);
      if(l2<nLeft) mk(`M0 ${cy2} H${xM}`);
      mk(`M${xM} ${cy1} V${l2<nLeft?cy2:cy1}`);
      mk(`M${xM} ${cmid} H28`);
    }
    wrap.appendChild(svg);
    return wrap;
  }

  const MATCH_H=70; // altura estimada de cada partido en px

  /* leyenda */
  const legend=document.createElement('div');legend.className='bracket-legend';
  legend.innerHTML=`
    <div class="bl-item"><div class="bl-box" style="background:rgba(24,160,96,0.13);border:1px solid rgba(24,160,96,0.38);"></div>Ganador</div>
    <div class="bl-item"><div class="bl-box" style="background:rgba(232,160,32,0.06);border:1px solid rgba(232,160,32,0.2);"></div>Resultado</div>
    <div class="bl-item"><div class="bl-box" style="background:rgba(232,160,32,0.03);border:1px dashed rgba(232,160,32,0.25);"></div>Por definir</div>`;
  el.appendChild(legend);

  /* bracket */
  const scroll=document.createElement('div');scroll.className='bracket-scroll';
  const wrap=document.createElement('div');wrap.className='bracket-wrap';

  const COL_DELAY=160; // ms entre columnas

  wrap.appendChild(roundEl(round16,'Octavos de final', COL_DELAY*0));
  wrap.appendChild(connectorsEl(n16,nQF,MATCH_H));
  wrap.appendChild(roundEl(roundQF,'Cuartos de final',COL_DELAY*1));
  wrap.appendChild(connectorsEl(nQF,nSF,MATCH_H));
  wrap.appendChild(roundEl(roundSF,'Semifinales',       COL_DELAY*2));
  wrap.appendChild(connectorsEl(nSF,1,MATCH_H));
  wrap.appendChild(roundEl(roundF, 'рЯПЖ Final',          COL_DELAY*3));

  scroll.appendChild(wrap);
  el.appendChild(scroll);

  if(!useReal16){
    const note=document.createElement('div');note.className='bracket-note';
    note.innerHTML='Proyecci√≥n basada en posiciones actuales de grupos.<br>Los cruces definitivos se confirman al terminar la fase de grupos.';
    el.appendChild(note);
  }
}

/* вФАвФА SHOW вФАвФА */
function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  // re-triggerear animaciones del bracket si se vuelve a abrir
  if(id==='llaves'){
    document.querySelectorAll('.b-round').forEach((col,i)=>{
      col.classList.remove('anim-in');
      setTimeout(()=>col.classList.add('anim-in'), i*COL_DELAY||0);
    });
  }
}
const COL_DELAY=160;

/* вФАвФА FETCH вФАвФА */
async function fetchData(){
  try{
    const res=await fetch('/.netlify/functions/scores');
    if(!res.ok) throw new Error('API error');
    const data=await res.json();
    buildGrupos(data.standings);
    buildResultados(data.finished);
    buildProximos(data.upcoming,data.live);
    buildLlaves(data.standings,data.knockout);
    const now=new Date();
    document.getElementById('last-update').textContent=`Actualizado ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }catch(e){
    document.getElementById('last-update').textContent='Error al cargar datos';
    console.error(e);
  }
}

fetchData();
setInterval(fetchData,60000);
</script>
